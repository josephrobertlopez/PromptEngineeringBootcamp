<h2 id="the-three-intuitions-behind-every-ai-tool">The Three Intuitions Behind Every AI Tool</h2>
<h3 id="prompt-engineering-bootcamp-v2--required-prereq">Prompt Engineering Bootcamp v2 — Required Prereq</h3>
<p>Duration: 15-20 minute self-study</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-class="transition" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="transition" data-marpit-pagination="3" style="--paginate:true;--class:transition;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>

<h1 id="before-the-live-session">Before the Live Session</h1>
<p>Before the live session, you need three intuitions. Not facts. Not definitions. Intuitions — things you feel are true because you've tested them yourself.</p>
<p>These three intuitions are the foundation everything else builds on. If you skip this, the session won't land.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-class="theory" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="theory" data-marpit-pagination="5" style="--paginate:true;--class:theory;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="intuition-1-context-is-everything">Intuition 1: Context Is Everything</h2>
<p>The AI doesn't know you. It doesn't know your project, your role, your metrics, your client. Every time you open a chat, it starts from zero.</p>
<p>The ONLY thing it works with is what you give it in that moment.</p>
<p>This seems obvious. But most people act as if the AI should &quot;just know&quot; — and then blame it when the output is generic.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-class="exercise" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="exercise" data-marpit-pagination="7" style="--paginate:true;--class:exercise;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="try-this-right-now">Try This Right Now</h2>
<p>Open your AI tool (ChatGPT, Claude, Copilot — any of them).</p>
<p><strong>Attempt 1 — No context:</strong></p>
<pre><code>Write my FY26 priority for AI enablement.
</code></pre>
<p>Save the output.</p>
<p><strong>Attempt 2 — Rich context:</strong></p>
<pre><code>I'm a Senior Analyst at the organization, 5 years in Technology Consulting.
My biggest project: banking automation that reduced processing from 
3 minutes to 30 seconds per dataset. I processed 1,500+ datasets 
and presented 4 POCs to senior management. My AI tool usage includes 
daily Copilot and weekly Claude for architecture decisions.

Write my FY26 priority for AI enablement, including:
- Category: AI Enablement
- 50-100 word description with specific deliverables
- Metrics from: AI Tool Usage, Innovation Impact, Knowledge Sharing
- ABCD reflection (Accomplishment, Business Impact, Challenge, Development)
</code></pre>
<p>Save the output. Compare them.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-class="solution" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="solution" data-marpit-pagination="9" style="--paginate:true;--class:solution;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="what-you-just-felt">What You Just Felt</h2>
<p>The first output was generic. The second was specific, useful, maybe even submission-ready.</p>
<p>Same AI. Same model. Same day. The only difference: <strong>what you put in</strong>.</p>
<p><strong>The intuition:</strong> The AI is a context-completion machine. It completes patterns from whatever you give it. Give it nothing, get nothing. Give it your actual work, get actual results.</p>
<p>This is the only principle. Everything else — every pattern, every technique, every tool — is just a different way of getting the right context in front of the AI.</p>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-class="theory" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="theory" data-marpit-pagination="14" style="--paginate:true;--class:theory;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>

<h2 id="why-structure-matters">Why Structure Matters</h2>
<p>You might think: &quot;I gave it context in Attempt 2, so context is all that matters. Format doesn't matter as long as the info is there.&quot;</p>
<p>Test that assumption.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-class="exercise" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="exercise" data-marpit-pagination="16" style="--paginate:true;--class:exercise;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="try-this-right-now-1">Try This Right Now</h2>
<p>Take the SAME information from Attempt 2, but deliver it two ways:</p>
<p><strong>Attempt 3 — Wall of text:</strong></p>
<pre><code>I'm a senior analyst at a Fortune 500 company with 5 years experience in 
technology consulting and my biggest project was banking automation 
where I reduced processing from 3 min to 30 sec per dataset and 
I processed over 1500 datasets and presented 4 POCs to senior 
management and I use copilot daily and claude weekly for architecture 
so write my fy26 priority for ai enablement with description 
metrics and abcd reflection
</code></pre>
<p><strong>Attempt 4 — Structured:</strong></p>
<pre><code>## Role
Senior Analyst, Technology Consulting (5 years)

## Key Achievement
Banking automation: 3 min → 30 sec per dataset
- 1,500+ datasets processed
- 4 POCs presented to senior management

## AI Tool Usage
- Daily: GitHub Copilot (code assistance)
- Weekly: Claude (architecture decisions)

## Task
Write FY26 priority for AI Enablement:
- Description: 50-100 words, specific deliverables
- Metrics: AI Tool Usage, Innovation Impact, Knowledge Sharing
- ABCD Reflection: all four components with evidence
- Format: Ready for Workday submission
</code></pre>
<p>Compare the outputs. Same information. Different structure.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-class="solution" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="solution" data-marpit-pagination="18" style="--paginate:true;--class:solution;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="what-you-just-felt-1">What You Just Felt</h2>
<p>The structured version produced cleaner, more organized, more usable output. The wall-of-text version probably missed things or jumbled the order.</p>
<p><strong>The intuition:</strong> The AI mirrors the structure you give it. It's not just about WHAT you provide — it's about HOW you organize it.</p>
<p>Why? Because the model was trained on millions of examples where humans preferred clear, structured responses to clear, structured requests. It learned: &quot;when the input is organized, the human wants organized output.&quot; That training is baked in. You're not fighting the tool when you use structure — you're working WITH its training.</p>
<p>Headings, bullet points, labeled sections, explicit output formats — these aren't optional formatting. They're signals the AI was trained to respect.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-class="transition" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="transition" data-marpit-pagination="20" style="--paginate:true;--class:transition;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h1 id="intuition-3">Intuition 3</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="you-are-the-retrieval-system">You Are the Retrieval System</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-class="theory" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="theory" data-marpit-pagination="23" style="--paginate:true;--class:theory;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="where-does-context-come-from">Where Does Context Come From?</h2>
<p>In Attempts 2 and 4, YOU typed all the context. You pulled it from your memory, organized it, and pasted it in.</p>
<p>That works. But think about what you just did:</p>
<ol>
<li><strong>Retrieved</strong> relevant information (from your memory)</li>
<li><strong>Organized</strong> it into structured context</li>
<li><strong>Fed</strong> it to the AI for generation</li>
</ol>
<p>You were the retrieval system. You did the work of finding, organizing, and delivering the right information.</p>
<p>Now imagine: what if a system did steps 1 and 2 for you?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-class="exercise" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="exercise" data-marpit-pagination="25" style="--paginate:true;--class:exercise;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="try-this-right-now-2">Try This Right Now</h2>
<p>You've typed context twice. Now you're going to FEEL the difference between pulling context from your brain and pulling it from a file.</p>
<p><strong>Attempt 5 — Manual retrieval:</strong><br />
Open a new chat in your AI tool (don't use the previous conversation). Type this prompt:</p>
<pre><code>Write my FY26 priority for AI Enablement using the following context:

I'm a Senior Analyst at the organization, 5 years in Technology Consulting.
My biggest project: banking automation that reduced processing from
3 minutes to 30 seconds per dataset. I processed 1,500+ datasets
and presented 4 POCs to senior management. My AI tool usage includes
daily Copilot and weekly Claude for architecture decisions.

Write the priority with:
- Category: AI Enablement
- 50-100 word description with specific deliverables
- Metrics from: AI Tool Usage, Innovation Impact, Knowledge Sharing
- ABCD reflection (Accomplishment, Business Impact, Challenge, Development)
</code></pre>
<p>Save the output. Keep it open.</p>
<p><strong>Attempt 6 — File-assisted retrieval:</strong></p>
<p>Now you're going to build a tiny retrieval system:</p>
<ol>
<li><strong>Create a text file</strong> on your desktop called <code>my-context.txt</code></li>
<li><strong>Fill it</strong> with the structured version from Attempt 4 (the one with headings):</li>
</ol>
<pre><code>## Role
Senior Analyst, Technology Consulting (5 years)

## Key Achievement
Banking automation: 3 min → 30 sec per dataset
- 1,500+ datasets processed
- 4 POCs presented to senior management

## AI Tool Usage
- Daily: GitHub Copilot (code assistance)
- Weekly: Claude (architecture decisions)
</code></pre>
<ol start="3">
<li><strong>Save the file</strong></li>
<li><strong>Open a BRAND NEW chat</strong> (different conversation)</li>
<li><strong>Paste the entire file contents into the chat</strong>, then add this single-line instruction:</li>
</ol>
<pre><code>Write my FY26 priority for AI Enablement using the context above.
</code></pre>
<p>Save this output. Compare it to Attempt 5.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-class="solution" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="solution" data-marpit-pagination="28" style="--paginate:true;--class:solution;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="what-you-just-felt-2">What You Just Felt</h2>
<p>Both outputs were probably similar. Maybe even identical. Same structured context, same request, same AI model — one came from your brain, one came from a file.</p>
<p>But notice what happened: In Attempt 5, YOU did the retrieval (pulled from memory). In Attempt 6, the FILE did the retrieval (you just pointed to it).</p>
<p>The AI didn't care. It worked with whatever context it got. The retrieval system changed, but the operation stayed the same.</p>
<p><strong>The intuition:</strong> Every &quot;AI tool&quot; you'll encounter — from simple prompts to enterprise platforms — is doing the same three things:</p>
<ol>
<li><strong>Retrieving</strong> relevant information from <em>somewhere</em></li>
<li><strong>Assembling</strong> it into structured context</li>
<li><strong>Generating</strong> output from that context</li>
</ol>
<p>When you typed Attempt 5, YOU were the retrieval system. When you saved and pasted the file in Attempt 6, the FILE became the retrieval system. When a tool asks you questions first, the TOOL is the retrieval system. When an enterprise platform pulls from databases, the PLATFORM is the retrieval system.</p>
<p>The operation never changes. Only who or what does the retrieving changes.</p>
<p><strong>The intuition:</strong> Whenever you see an AI tool doing something impressive, ask: &quot;Where is it getting its context from?&quot; The answer is always: somewhere specific. There's no magic. Just good retrieval. You just built one by hand.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-class="insights" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" class="insights" data-marpit-pagination="30" style="--paginate:true;--class:insights;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35"></section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
<h2 id="your-three-intuitions">Your Three Intuitions</h2>
<p><strong>1. Context is everything.</strong><br />
The AI completes patterns from what you give it. More relevant context = better output. Always.</p>
<p><strong>2. Structure gets rewarded.</strong><br />
Organized input → organized output. The AI was trained to respect structure. Use it.</p>
<p><strong>3. You are the retrieval system (until you automate it).</strong><br />
Every AI interaction is: retrieve context → assemble it → generate output. The question is always: who or what is doing the retrieval?</p>
<p>These three intuitions explain every AI pattern, tool, and technique you'll encounter. The live session builds on them. If you felt them through the exercises, you're ready.</p>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-heading-divider="2" data-theme="6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--heading-divider:2;--theme:6fcle9cfgka8k6xxacfyioh1dk2ktdu27z1l7ncdwxbe;" data-marpit-pagination-total="35">
